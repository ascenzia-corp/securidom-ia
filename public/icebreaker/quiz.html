<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Profil IA — Questionnaire</title>
  <link href="https://fonts.cdnfonts.com/css/telegraf" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Telegraf', 'Inter', -apple-system, sans-serif;
      background: linear-gradient(135deg, #1A202C 0%, #2D3748 100%);
      color: #EBEBEE;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo {
      height: 36px;
      margin-bottom: 16px;
      opacity: 0.9;
    }

    /* Barre de progression */
    .progress-container {
      margin-bottom: 32px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: #A0AEC0;
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #4A5568;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #DDAC63;
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* Contenu principal */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Écran prénom */
    .screen {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .screen h2 {
      font-size: 1.1rem;
      color: #DDAC63;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .text-input {
      width: 100%;
      padding: 14px 18px;
      background: #1A202C;
      border: 1px solid #4A5568;
      border-radius: 8px;
      color: #EBEBEE;
      font-size: 1.1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 24px;
    }

    .text-input:focus { border-color: #DDAC63; }

    /* Question */
    .question-text {
      font-size: 1.05rem;
      line-height: 1.5;
      margin-bottom: 28px;
      color: #EBEBEE;
    }

    /* Échelle 1-5 */
    .scale {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .scale-btn {
      flex: 1;
      aspect-ratio: 1;
      max-width: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1A202C;
      border: 2px solid #4A5568;
      border-radius: 12px;
      color: #EBEBEE;
      font-size: 1.2rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .scale-btn:hover { border-color: #DDAC63; background: rgba(221, 172, 99, 0.1); }

    .scale-btn.selected {
      border-color: #DDAC63;
      background: #DDAC63;
      color: #1A202C;
      transform: scale(1.1);
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #A0AEC0;
      margin-bottom: 32px;
      padding: 0 4px;
    }

    /* Boutons navigation */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
    }

    .btn {
      padding: 12px 28px;
      background: #DDAC63;
      color: #1A202C;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover { background: #B8860B; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-back {
      background: transparent;
      color: #A0AEC0;
      padding: 12px 16px;
    }

    .btn-back:hover { background: transparent; color: #EBEBEE; }

    /* Spinner */
    .spinner {
      display: none;
      text-align: center;
      padding: 48px;
    }

    .spinner.active { display: block; }

    .spinner-circle {
      width: 40px;
      height: 40px;
      border: 3px solid #4A5568;
      border-top-color: #DDAC63;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      color: #E53E3E;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    .error-msg.visible { display: block; }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Header -->
    <div class="header">
      <img src="https://www.ascenzia.fr/hubfs/Corporate/Logos/PNG/logo_ascenzia_fond_sombre.png" alt="Ascenzia" class="logo">
    </div>

    <!-- Barre de progression -->
    <div class="progress-container">
      <div class="progress-label">
        <span id="progressStep">Étape 1 sur 11</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Contenu -->
    <div class="content">
      <!-- Écran prénom -->
      <div class="screen active" id="screenName">
        <h2>Comment vous appelez-vous ?</h2>
        <input type="text" class="text-input" id="nameInput" placeholder="Votre prénom" autofocus>
        <p class="error-msg" id="nameError">Merci d'entrer votre prénom pour continuer.</p>
        <div class="nav">
          <span></span>
          <button class="btn" id="nameNext">Commencer →</button>
        </div>
      </div>

      <!-- Écrans questions (générés en JS) -->
      <div id="questionsContainer"></div>

      <!-- Spinner envoi -->
      <div class="spinner" id="spinner">
        <div class="spinner-circle"></div>
        <p>Calcul de votre profil…</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { firebaseConfig } from "./js/firebase-config.js";
    import { QUESTIONS, AXES, computeScores, computeGlobal, getLabel } from "./js/scoring.js";

    // --- Init Firebase (avec gestion d'erreur) ---
    let app, db;
    let firebaseOk = false;
    try {
      app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      firebaseOk = true;
    } catch (err) {
      console.error("Erreur Firebase:", err);
    }

    // --- Session ---
    const params = new URLSearchParams(window.location.search);
    const sessionId = params.get("session");
    if (!sessionId) {
      window.location.href = "index.html";
    }

    // --- État ---
    let currentStep = 0; // 0 = prénom, 1-10 = questions
    const totalSteps = QUESTIONS.length + 1;
    const answers = new Array(QUESTIONS.length).fill(0);
    let participantName = "";

    // --- Éléments DOM ---
    const progressStep = document.getElementById("progressStep");
    const progressPct = document.getElementById("progressPct");
    const progressFill = document.getElementById("progressFill");
    const screenName = document.getElementById("screenName");
    const nameInput = document.getElementById("nameInput");
    const nameError = document.getElementById("nameError");
    const questionsContainer = document.getElementById("questionsContainer");
    const spinner = document.getElementById("spinner");

    // --- Générer les écrans de questions ---
    QUESTIONS.forEach((q, i) => {
      const div = document.createElement("div");
      div.className = "screen";
      div.id = `screenQ${i}`;
      div.innerHTML = `
        <p class="question-text">${q}</p>
        <div class="scale" data-q="${i}">
          ${[1, 2, 3, 4, 5].map((n) => `<button class="scale-btn" data-value="${n}">${n}</button>`).join("")}
        </div>
        <div class="scale-labels">
          <span>Pas du tout d'accord</span>
          <span>Tout à fait d'accord</span>
        </div>
        <p class="error-msg" id="errorQ${i}">Merci de sélectionner une réponse.</p>
        <div class="nav">
          <button class="btn btn-back" onclick="window.quizBack()">← Retour</button>
          <button class="btn" id="nextQ${i}">${i === QUESTIONS.length - 1 ? "Voir mon profil →" : "Suivant →"}</button>
        </div>
      `;
      questionsContainer.appendChild(div);
    });

    // --- Gestion des clics sur les boutons d'échelle ---
    document.querySelectorAll(".scale").forEach((scaleDiv) => {
      const qi = parseInt(scaleDiv.dataset.q);
      scaleDiv.querySelectorAll(".scale-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          scaleDiv.querySelectorAll(".scale-btn").forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
          answers[qi] = parseInt(btn.dataset.value);
          document.getElementById(`errorQ${qi}`).classList.remove("visible");
        });
      });
    });

    // --- Mise à jour progression ---
    function updateProgress() {
      const pct = Math.round((currentStep / totalSteps) * 100);
      progressStep.textContent = `Étape ${currentStep + 1} sur ${totalSteps}`;
      progressPct.textContent = `${pct}%`;
      progressFill.style.width = `${pct}%`;
    }

    // --- Navigation ---
    function showStep(step) {
      // Masquer tous les écrans
      document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
      spinner.classList.remove("active");

      if (step === 0) {
        screenName.classList.add("active");
        nameInput.focus();
      } else {
        const screen = document.getElementById(`screenQ${step - 1}`);
        if (screen) {
          screen.classList.add("active");
          // Re-appliquer l'animation
          screen.style.animation = "none";
          screen.offsetHeight; // force reflow
          screen.style.animation = "";
        }
      }
      currentStep = step;
      updateProgress();
    }

    // --- Bouton prénom ---
    document.getElementById("nameNext").addEventListener("click", () => {
      participantName = nameInput.value.trim();
      if (!participantName) {
        nameError.classList.add("visible");
        nameInput.focus();
        return;
      }
      nameError.classList.remove("visible");
      showStep(1);
    });

    nameInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") document.getElementById("nameNext").click();
    });

    // --- Boutons suivant pour chaque question ---
    QUESTIONS.forEach((_, i) => {
      document.getElementById(`nextQ${i}`).addEventListener("click", () => {
        if (answers[i] === 0) {
          document.getElementById(`errorQ${i}`).classList.add("visible");
          return;
        }
        if (i === QUESTIONS.length - 1) {
          submitQuiz();
        } else {
          showStep(i + 2);
        }
      });
    });

    // --- Bouton retour (global) ---
    window.quizBack = function () {
      if (currentStep > 0) {
        showStep(currentStep - 1);
      }
    };

    // --- Soumission ---
    async function submitQuiz() {
      document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
      spinner.classList.add("active");

      const scores = computeScores(answers);
      const globalScore = computeGlobal(scores);
      const { label } = getLabel(globalScore);

      const data = {
        name: participantName,
        answers,
        scores,
        globalScore: Math.round(globalScore * 100) / 100,
        label,
        submittedAt: Date.now()
      };

      // Stocker en sessionStorage pour la page résultat
      sessionStorage.setItem("icebreaker_result", JSON.stringify(data));

      try {
        if (firebaseOk) {
          const participantRef = push(ref(db, `sessions/${sessionId}/participants`));
          await set(participantRef, data);
        }
      } catch (err) {
        console.error("Erreur Firebase:", err);
        // On continue quand même vers les résultats
      }

      window.location.href = `result.html?session=${encodeURIComponent(sessionId)}`;
    }

    // --- Init ---
    updateProgress();
  </script>
</body>
</html>
